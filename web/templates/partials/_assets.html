<!-- ACTIVE ASSETS (right panel) -->
<div class="panel-header">
  <span class="ph-icon">&#9673;</span>
  Active Assets
  <span class="ph-count" id="qAssetsCount">0</span>
</div>
<div class="panel-body" style="padding: 0;">
  <!-- Stat cards row -->
  <div class="card-grid">
    <div class="stat-card">
      <div class="sc-label">Running</div>
      <div class="sc-value" id="assetRunningCount" style="color:var(--green);">-</div>
    </div>
    <div class="stat-card">
      <div class="sc-label">Stopped</div>
      <div class="sc-value" id="assetStoppedCount" style="color:var(--amber);">-</div>
    </div>
    <div class="stat-card">
      <div class="sc-label">Templates</div>
      <div class="sc-value" id="assetTemplateCount" style="color:var(--purple);">-</div>
    </div>
  </div>

  <!-- VM Table -->
  <table class="data-table q-table">
    <thead>
      <tr>
        <th>VMID</th>
        <th>Name</th>
        <th>IP</th>
        <th>Group</th>
        <th>Status</th>
        <th>Actions</th>
        <th>First Seen</th>
        <th>Last Seen</th>
      </tr>
    </thead>
    <tbody id="vmTableBody"></tbody>
  </table>
</div>
