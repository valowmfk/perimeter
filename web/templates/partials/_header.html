<!-- HEADER -->
<header class="header" role="banner">
    <div class="header-title">
        <span>PERIMETER</span> // {{ homelab_name or 'Automation Platform' }}
    </div>
    <div class="header-sep"></div>
    <div class="header-status">
        <!-- Proxmox Status Chip -->
        <div class="status-chip-wrapper" data-action="toggle-proxmox-flyout" role="button" tabindex="0" aria-expanded="false" aria-label="Toggle Proxmox cluster flyout">
            <div class="status-chip">
                <span class="status-dot" id="proxmoxStatusDot"></span>
                <span id="proxmoxStatusBadge">unknown</span>
                <span id="proxmoxStatusMeta" class="status-meta">{{ pm_node }}</span>
                <span class="status-chevron" id="proxmoxChevron">&#9662;</span>
            </div>
            <!-- PROXMOX CLUSTER FLYOUT -->
            <div id="proxmoxFlyout" class="flyout" style="display:none;">
                <div id="proxmoxNodeStatus"></div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>VMID</th>
                            <th>Type</th>
                            <th>Last Updated</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="proxmoxTemplateBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Certificate Status Chip -->
        <div class="status-chip-wrapper" data-action="toggle-cert-flyout" role="button" tabindex="0" aria-expanded="false" aria-label="Toggle certificate status flyout">
            <div class="status-chip">
                <span id="certCountStrip">-</span> certs &middot; <span id="nextExpiryStrip">-</span>
                <span class="status-chevron" id="certChevron">&#9662;</span>
            </div>
            <!-- CERTIFICATE STATUS FLYOUT -->
            <div id="certFlyout" class="flyout" style="display:none;">
                <div id="certFlyoutSummary" class="q-cert-flyout-summary"></div>
                <div id="certFlyoutContent" class="q-cert-flyout-content"></div>
            </div>
        </div>
    </div>
    <div class="header-right">
        <span class="header-badge">v3.3</span>
    </div>
</header>

<div class="toast" id="toast" role="status" aria-live="polite">Copied!</div>
