<!-- TERMINAL -->
<div class="terminal">
  <div class="terminal-bar" data-action="toggle-terminal">
    <span class="terminal-live"></span>
    <span class="terminal-label">LIVE STREAM</span>
    <span class="terminal-actions">
      <button class="terminal-maximize" data-action="maximize-terminal" title="Maximize terminal" aria-label="Maximize terminal">&#9634;</button>
      <span class="terminal-chevron" id="terminalChevron">&#9650;</span>
    </span>
  </div>
  <pre id="terminalLog" class="terminal-output" role="log" aria-label="Live provisioning output" aria-live="polite"></pre>
</div>
